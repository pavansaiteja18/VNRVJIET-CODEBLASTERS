<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ShaktiAI — Empowering Rural Women</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --s:#E8631A;--sl:#FFF3EA;--sm:#F5A96B;--sd:#C14B1F;
  --g:#1B6B45;--gl:#E6F5EE;--gm:#3DB578;
  --i:#1E2140;--il:#ECEDF8;--im:#6B7280;
  --gold:#D4A017;--goldl:#FDF6E0;
  --ruby:#C0392B;--rubyl:#FDECEA;
  --cream:#FEFAF4;--chalk:#F7F4EE;
  --border:rgba(30,33,64,0.1);--border2:rgba(30,33,64,0.18);
  --r:14px;--rs:8px;
  --sh:0 2px 16px rgba(30,33,64,0.08);
}
body{font-family:"Poppins",sans-serif;background:var(--cream);color:var(--i);overflow:hidden;height:100vh}
.lang-te{font-family:"Noto Sans Telugu",sans-serif}
.lang-hi{font-family:"Noto Sans Devanagari",sans-serif}
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:222px;min-width:222px;background:var(--i);display:flex;flex-direction:column;position:relative;overflow:hidden}
.sb::after{content:"";position:absolute;bottom:-60px;right:-60px;width:160px;height:160px;border-radius:50%;background:rgba(232,99,26,0.07);pointer-events:none}
.sb-logo{padding:16px 18px 14px;border-bottom:1px solid rgba(255,255,255,0.07)}
.sb-brand{font-family:"Noto Sans Devanagari",sans-serif;font-size:22px;color:var(--s);font-weight:700;letter-spacing:-0.5px}
.sb-tag{font-size:9px;color:rgba(255,255,255,0.32);margin-top:2px;letter-spacing:0.5px}
.sb-nav{flex:1;padding:8px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{display:none}
.sb-sec{padding:10px 18px 4px;font-size:9px;color:rgba(255,255,255,0.22);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.ni{display:flex;align-items:center;gap:9px;padding:9px 18px;cursor:pointer;transition:all 0.15s;font-size:12.5px;color:rgba(255,255,255,0.52);font-weight:500;border-left:3px solid transparent}
.ni:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.82)}
.ni.active{background:rgba(232,99,26,0.14);color:var(--s);border-left-color:var(--s)}
.ni-badge{margin-left:auto;background:var(--s);color:#fff;font-size:9px;padding:1px 6px;border-radius:8px;font-weight:700}
.ni-new{margin-left:auto;background:var(--gm);color:#fff;font-size:8px;padding:1px 5px;border-radius:6px;font-weight:700;letter-spacing:0.3px}
.sb-foot{padding:12px 14px;border-top:1px solid rgba(255,255,255,0.07)}
.sb-user{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.sb-pts{display:flex;justify-content:space-between;padding:7px 10px;background:rgba(255,255,255,0.06);border-radius:8px}
.ava{width:30px;height:30px;border-radius:50%;background:var(--s);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;flex-shrink:0}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 22px;background:#fff;border-bottom:1px solid var(--border);flex-shrink:0;z-index:10}
.tb-title{font-size:15px;font-weight:700;color:var(--i)}
.tb-r{display:flex;align-items:center;gap:10px}
.lang-wrap{display:flex;gap:2px;background:var(--il);border-radius:20px;padding:3px}
.lo{padding:3px 10px;border-radius:16px;font-size:11px;cursor:pointer;font-weight:600;color:var(--im);transition:all 0.15s}
.lo.active{background:var(--s);color:#fff}
.nbell{position:relative;width:32px;height:32px;border-radius:8px;background:var(--sl);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
.ndot{position:absolute;top:5px;right:5px;width:7px;height:7px;border-radius:50%;background:var(--sd);border:2px solid #fff}
.content{flex:1;overflow-y:auto;padding:18px 22px}
.card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:18px;box-shadow:var(--sh)}
.card-title{font-size:14px;font-weight:700;color:var(--i);margin-bottom:3px}
.card-sub{font-size:11px;color:var(--im)}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
.stat{background:var(--chalk);border-radius:10px;padding:14px;border:1px solid var(--border)}
.stat-val{font-size:22px;font-weight:800;color:var(--sd)}
.stat-label{font-size:10px;color:var(--im);margin-top:3px;font-weight:500}
.stat-delta{font-size:10px;color:var(--gm);font-weight:600;margin-top:4px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all 0.15s;font-family:"Poppins",sans-serif}
.btn:disabled{opacity:0.55;cursor:not-allowed}
.bp{background:var(--s);color:#fff}.bp:hover:not(:disabled){background:var(--sd)}
.bo{background:transparent;color:var(--s);border:1.5px solid var(--s)}.bo:hover:not(:disabled){background:var(--sl)}
.bg{background:var(--g);color:#fff}.bg:hover:not(:disabled){background:#0f4a30}
.bsm{padding:5px 10px;font-size:11px}
.btn-full{width:100%;justify-content:center}
.fg{margin-bottom:13px}
.fl{display:block;font-size:11px;font-weight:600;color:var(--i);margin-bottom:5px}
.fi{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;font-family:"Poppins",sans-serif;color:var(--i);background:var(--chalk);outline:none;transition:border 0.15s}
.fi:focus{border-color:var(--s);background:#fff}
.auth-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1E2140 0%,#1B6B45 60%,#E8631A 100%);position:relative;overflow:hidden}
.auth-ring{position:absolute;border:1px solid rgba(255,255,255,0.06);border-radius:50%;pointer-events:none}
.auth-card{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,0.3);position:relative;z-index:2}
.tabs{display:flex;gap:3px;background:var(--chalk);border-radius:8px;padding:3px;border:1px solid var(--border);margin-bottom:16px}
.tab{flex:1;padding:7px;text-align:center;font-size:11px;font-weight:600;border-radius:6px;cursor:pointer;color:var(--im);transition:all 0.15s}
.tab.active{background:var(--s);color:#fff}
.wbanner{background:linear-gradient(135deg,#1E2140 0%,#1B6B45 100%);border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden}
.wbanner::before{content:"";position:absolute;right:-25px;top:-25px;width:140px;height:140px;border-radius:50%;background:rgba(255,255,255,0.05)}
.wbanner::after{content:"";position:absolute;right:60px;bottom:-40px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,0.04)}
.sc-badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;margin-bottom:8px}
.bg-green{background:var(--gl);color:var(--g)}
.bg-gold{background:var(--goldl);color:var(--gold)}
.bg-saffron{background:var(--sl);color:var(--sd)}
.bg-teal{background:#E0F4F4;color:#0D7377}
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 122px)}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:12px}
.msg{display:flex;gap:9px;align-items:flex-start;animation:msgIn 0.22s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg-u{flex-direction:row-reverse}
.mava{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px}
.mava-ai{background:var(--s);color:#fff}
.mava-u{background:var(--g);color:#fff}
.mbub{max-width:72%;padding:10px 14px;border-radius:14px;font-size:12.5px;line-height:1.65}
.mbub-ai{background:#fff;border:1px solid var(--border);border-radius:3px 14px 14px 14px;color:var(--i);white-space:pre-wrap}
.mbub-u{background:var(--s);color:#fff;border-radius:14px 3px 14px 14px}
.chat-in{display:flex;gap:9px;align-items:flex-end;padding-top:12px;border-top:1px solid var(--border);flex-shrink:0}
.chat-ta{flex:1;padding:10px 14px;border:1.5px solid var(--border);border-radius:14px;font-size:12.5px;font-family:"Poppins",sans-serif;resize:none;min-height:42px;max-height:100px;color:var(--i);background:var(--chalk);outline:none;transition:border 0.15s}
.chat-ta:focus{border-color:var(--s);background:#fff}
.mic-btn{width:38px;height:38px;border-radius:50%;background:var(--gl);border:none;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.mic-btn.on{background:#ffecec;animation:mic-pulse 1.2s infinite}
@keyframes mic-pulse{0%,100%{box-shadow:0 0 0 0 rgba(192,57,43,0.4)}50%{box-shadow:0 0 0 8px rgba(192,57,43,0)}}
.pb{background:rgba(30,33,64,0.08);border-radius:20px;overflow:hidden;height:7px}
.pbf{height:100%;border-radius:20px;background:var(--s);transition:width 0.6s cubic-bezier(0.34,1.56,0.64,1)}
.pbg{background:var(--gm)}
.mc{background:#fff;border-radius:14px;border:1px solid var(--border);padding:14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all 0.15s}
.mc:hover{border-color:var(--s);box-shadow:var(--sh)}
.mc.done{border-color:var(--gm);background:var(--gl)}
.mc-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.typing{display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:var(--sm);animation:bonce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes bonce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.badge-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px;text-align:center;transition:all 0.2s}
.badge-card.earned{border-color:var(--gold);background:linear-gradient(135deg,#fffdf5,#fff8e0)}
.badge-card.earned::after{content:"✓";position:absolute;top:8px;right:10px;font-size:12px;font-weight:700;color:var(--gold)}
.badge-card{position:relative}
.at{width:100%;border-collapse:collapse;font-size:12px}
.at th{text-align:left;padding:8px 12px;font-size:10px;text-transform:uppercase;letter-spacing:0.5px;color:var(--im);border-bottom:1px solid var(--border);font-weight:600}
.at td{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,0.04);color:var(--i)}
.at tr:hover td{background:var(--chalk)}
.cli{display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,0.04);cursor:pointer}
.chk{width:18px;height:18px;border:2px solid var(--border2);border-radius:4px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;font-size:10px;color:#fff}
.chk.on{background:var(--g);border-color:var(--g)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--i);color:#fff;padding:10px 18px;border-radius:10px;font-size:12px;z-index:9999;animation:toastIn 0.3s ease;box-shadow:0 4px 20px rgba(0,0,0,0.2);max-width:300px;font-weight:500}
@keyframes toastIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.notif-panel{position:absolute;top:38px;right:0;background:#fff;border:1px solid var(--border);border-radius:14px;width:290px;box-shadow:0 8px 30px rgba(0,0,0,0.12);z-index:200;overflow:hidden}
.pr{background:var(--sl);border:1.5px solid var(--sm);border-radius:14px;padding:18px;margin-top:14px}
.hashtag{display:inline-block;background:var(--sd);color:#fff;padding:2px 7px;border-radius:20px;font-size:10px;margin:2px}
.alert{padding:10px 14px;border-radius:8px;font-size:12px;margin-bottom:14px}
.alert-info{background:var(--il);color:var(--i);border:1px solid rgba(30,33,64,0.15)}
.alert-success{background:var(--gl);color:var(--g);border:1px solid rgba(27,107,69,0.2)}
.div{height:1px;background:var(--border);margin:14px 0}
.plan-content{font-size:13px;line-height:1.8;color:var(--i);background:var(--chalk);padding:12px 16px;border-radius:8px;border:1px solid var(--border);white-space:pre-wrap;margin-bottom:14px}
.emi-result{background:linear-gradient(135deg,var(--i),#2e3260);border-radius:14px;padding:20px;color:#fff;margin-top:14px}
.tx-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid rgba(0,0,0,0.04)}
.post-card{background:#fff;border-radius:14px;border:1px solid var(--border);padding:16px;margin-bottom:12px}
.post-ava{width:36px;height:36px;border-radius:50%;background:var(--s);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.post-like{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--chalk);border:1px solid var(--border);font-size:11px;cursor:pointer;font-weight:600;transition:all 0.15s}
.post-like:hover{background:var(--sl);border-color:var(--s);color:var(--sd)}
.inv-card{background:#fff;border:2px solid var(--border2);border-radius:14px;padding:24px;font-size:12px}
.inv-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;padding-bottom:14px;border-bottom:2px solid var(--border)}
/* CONFETTI */
.confetti-piece{position:fixed;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards;pointer-events:none;z-index:9998}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
/* MASCOT */
.mascot{position:fixed;bottom:24px;right:24px;z-index:500;cursor:pointer}
.mascot-bubble{position:absolute;bottom:70px;right:0;background:#fff;border:1.5px solid var(--border);border-radius:14px;border-bottom-right-radius:4px;padding:12px 16px;width:240px;box-shadow:var(--sh);font-size:12px;line-height:1.6;color:var(--i);animation:popIn 0.2s ease}
@keyframes popIn{from{transform:scale(0.8);opacity:0}to{transform:scale(1);opacity:1}}
.mascot-btn{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--s),var(--sd));display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 4px 16px rgba(232,99,26,0.4);transition:transform 0.2s}
.mascot-btn:hover{transform:scale(1.1)}
/* HEALTH SCORE */
.health-ring{width:110px;height:110px;position:relative;flex-shrink:0}
.health-ring svg{transform:rotate(-90deg)}
.health-score{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:800}
/* FESTIVAL CARD */
.fest-card{background:linear-gradient(135deg,#FFF8E0,#FFF0D0);border:1px solid var(--gold);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
/* QR */
.qr-grid{display:grid;grid-template-columns:repeat(21,1fr);gap:1px;width:126px;height:126px;padding:8px;background:#fff;border:1px solid var(--border);border-radius:8px}
.qr-cell{border-radius:1px}
/* VOICE MODE */
.voice-mode{position:fixed;inset:0;background:rgba(30,33,64,0.95);z-index:800;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.voice-waves{display:flex;align-items:center;gap:5px;height:60px;margin:24px 0}
.vw{width:6px;border-radius:3px;background:var(--s);animation:vwave 1s ease-in-out infinite}
.vw:nth-child(1){animation-delay:0s;height:16px}
.vw:nth-child(2){animation-delay:0.1s;height:32px}
.vw:nth-child(3){animation-delay:0.2s;height:48px}
.vw:nth-child(4){animation-delay:0.3s;height:60px}
.vw:nth-child(5){animation-delay:0.4s;height:48px}
.vw:nth-child(6){animation-delay:0.3s;height:32px}
.vw:nth-child(7){animation-delay:0.2s;height:16px}
@keyframes vwave{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}
/* ══════════ NEW MODULE STYLES ══════════ */
.timeline{position:relative;padding-left:28px}
.timeline::before{content:"";position:absolute;left:10px;top:8px;bottom:8px;width:2px;background:var(--border2)}
.tl-item{position:relative;margin-bottom:18px}
.tl-dot{position:absolute;left:-23px;top:4px;width:16px;height:16px;border-radius:50%;border:3px solid var(--border2);background:#fff;transition:all 0.2s;z-index:1}
.tl-dot.done{background:var(--gm);border-color:var(--gm)}
.tl-dot.active{background:var(--s);border-color:var(--s);box-shadow:0 0 0 4px var(--sl)}
.tl-dot.pending{background:#fff;border-color:var(--border2)}
.tl-content{background:#fff;border-radius:10px;border:1px solid var(--border);padding:12px 14px;font-size:12px}
.tl-title{font-weight:700;font-size:12.5px;margin-bottom:3px}
.tl-sub{font-size:10px;color:var(--im)}
.elig-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:700}
.elig-eligible{background:#E6F5EE;color:#1B6B45;border:1.5px solid #3DB578}
.elig-partial{background:#FFF8E0;color:#D4A017;border:1.5px solid #D4A017}
.elig-not{background:#FDECEA;color:#C0392B;border:1.5px solid #C0392B}
.prob-ring{position:relative;width:130px;height:130px;flex-shrink:0}
.prob-ring svg{transform:rotate(-90deg)}
.prob-score{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.doc-card{background:#fff;border:1.5px dashed var(--border2);border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.doc-card.uploaded{border-style:solid;border-color:var(--gm);background:var(--gl)}
.doc-card:hover{border-color:var(--s);background:var(--sl)}
.doc-card input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.rm-node{background:#fff;border:1px solid var(--border);border-radius:10px;padding:12px 14px;position:relative;text-align:center;transition:all 0.2s;cursor:default}
.rm-node:hover{border-color:var(--s);box-shadow:var(--sh)}
.rm-connector{width:2px;height:24px;background:var(--border2);margin:0 auto}
.fam-card{background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:14px;transition:all 0.2s;cursor:pointer}
.fam-card:hover{border-color:var(--s)}
.fam-card.selected{border-color:var(--s);background:var(--sl)}
.heatmap-cell{border-radius:4px;cursor:pointer;transition:all 0.15s;position:relative}
.heatmap-cell:hover{opacity:0.85;transform:scale(1.05)}
.offline-badge{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--ruby);color:#fff;padding:6px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;display:flex;align-items:center;gap:7px}
.wa-btn{background:#25D366;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:7px;font-family:"Poppins",sans-serif;transition:all 0.15s}
.wa-btn:hover{background:#1ebe57}
.impact-ring{width:90px;height:90px;position:relative;flex-shrink:0}
.impact-ring svg{transform:rotate(-90deg)}
.impact-score{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:800}
.voice-nav-card{background:linear-gradient(135deg,#1E2140,#2a3a6e);border-radius:14px;padding:22px;color:#fff;margin-bottom:16px}
.voice-result{background:#fff;border-radius:12px;border:1px solid var(--border);padding:16px;margin-bottom:10px;display:flex;gap:12px;align-items:flex-start;cursor:pointer;transition:all 0.15s}
.voice-result:hover{border-color:var(--s);box-shadow:var(--sh)}

function getApiKey(){return localStorage.getItem("shakti_api_key")||""}
function setApiKey(k){localStorage.setItem("shakti_api_key",k.trim())}

async function callAI(messages,system){
  let key=getApiKey();
  if(!key){
    key=prompt("Enter your FREE Groq API Key to use AI features:\nGet it free at: console.groq.com (no credit card needed)");
    if(!key)throw new Error("No API key");
    setApiKey(key);
  }
  try{
    const allMsgs=system?[{role:"system",content:system},...messages]:messages;
    const r=await fetch("https://api.groq.com/openai/v1/chat/completions",{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":"Bearer "+key},
      body:JSON.stringify({model:"llama-3.3-70b-versatile",max_tokens:800,messages:allMsgs})
    });
    const d=await r.json();
    if(d.error){
      if(d.error.code==="invalid_api_key"||d.error.status===401){
        localStorage.removeItem("shakti_api_key");
        throw new Error("Invalid Groq API key. Please try again.");
      }
      throw new Error(d.error.message||"API error");
    }
    return d.choices?.[0]?.message?.content||"Unable to respond. Please try again.";
  }catch(e){throw e}
}

function fireConfetti(){
  const colors=["#E8631A","#1B6B45","#D4A017","#3DB578","#C14B1F","#fff"];
  for(let i=0;i<60;i++){
    const el=document.createElement("div");
    el.className="confetti-piece";
    el.style.cssText="left:"+Math.random()*100+"vw;background:"+colors[Math.floor(Math.random()*colors.length)]+";width:"+(8+Math.random()*8)+"px;height:"+(8+Math.random()*8)+"px;animation-duration:"+(2+Math.random()*2)+"s;animation-delay:"+Math.random()*0.5+"s;border-radius:"+(Math.random()>0.5?"50%":"2px");
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

// QR CODE GENERATOR (pure JS, no library)
// ══════════════════════════════════════════════════
function QRDisplay({upiId}){
  const canvasRef=useRef();
  useEffect(()=>{
    if(!canvasRef.current)return;
    const c=canvasRef.current;const ctx=c.getContext("2d");
    c.width=140;c.height=140;
    ctx.fillStyle="#fff";ctx.fillRect(0,0,140,140);
    // Draw a decorative QR-like pattern (visual placeholder)
    ctx.fillStyle="#1E2140";
    const s=5;const off=10;
    for(let y=0;y<24;y++){for(let x=0;x<24;x++){
      const rand=((x*7+y*13+x*y)%3)===0;
      const inFinder=(x<7&&y<7)||(x>16&&y<7)||(x<7&&y>16);
      if(rand||inFinder){ctx.fillRect(off+x*s,off+y*s,s-1,s-1)}
    }}
    // Finder patterns
    ctx.strokeStyle="#1E2140";ctx.lineWidth=2;
    [[off,off],[off+17*s,off],[off,off+17*s]].forEach(([fx,fy])=>{
      ctx.strokeRect(fx,fy,7*s,7*s);
      ctx.fillRect(fx+s,fy+s,5*s,5*s);
      ctx.fillStyle="#fff";ctx.fillRect(fx+2*s,fy+2*s,3*s,3*s);
      ctx.fillStyle="#1E2140";ctx.fillRect(fx+3*s,fy+3*s,s,s);
    });
    // Center logo
    ctx.fillStyle="rgba(255,255,255,0.9)";ctx.fillRect(55,55,30,30);
    ctx.fillStyle="var(--s)";ctx.font="bold 16px Poppins";ctx.fillText("₹",62,74);
  },[upiId]);
  return React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8}},
    React.createElement("canvas",{ref:canvasRef,style:{borderRadius:8,border:"1px solid var(--border)"}}),
    React.createElement("div",{style:{fontSize:10,color:"var(--im)",fontWeight:500}},upiId||"your-biz@upi"),
    React.createElement("div",{style:{fontSize:9,color:"var(--im)"}},"Scan to pay instantly")
  );
}

// VOICE MODE OVERLAY
// ══════════════════════════════════════════════════
function VoiceMode({lang,user,onResult,onClose}){
  const t=L[lang];
  const [listening,setListening]=useState(false);
  const [transcript,setTranscript]=useState("");
  const recRef=useRef();
  useEffect(()=>{
    if(!("webkitSpeechRecognition"in window||"SpeechRecognition"in window)){
      onClose();return;
    }
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    const r=new SR();r.lang=lang==="te"?"te-IN":lang==="hi"?"hi-IN":"en-IN";
    r.continuous=false;r.interimResults=true;
    r.onresult=e=>{const txt=Array.from(e.results).map(r=>r[0].transcript).join("");setTranscript(txt);if(e.results[0].isFinal){onResult(txt);setTimeout(onClose,500)}};
    r.onend=()=>setListening(false);
    r.onerror=()=>onClose();
    r.start();recRef.current=r;setListening(true);
    return()=>{try{r.stop()}catch(e){}};
  },[]);
  return React.createElement("div",{className:"voice-mode",onClick:onClose},
    React.createElement("div",{style:{fontSize:50,marginBottom:8}},"🎤"),
    React.createElement("div",{style:{fontSize:20,fontWeight:700,marginBottom:6}},t.voice_mode_title),
    React.createElement("div",{style:{fontSize:13,opacity:0.7,marginBottom:20}},t.voice_mode_sub),
    React.createElement("div",{className:"voice-waves"},
      [1,2,3,4,5,6,7].map(i=>React.createElement("div",{key:i,className:"vw",style:{animationPlayState:listening?"running":"paused"}}))
    ),
    React.createElement("div",{style:{fontSize:14,fontWeight:500,minHeight:28,color:"var(--sm)"}},transcript||t.voice_mode_listening),
    React.createElement("div",{style:{fontSize:11,opacity:0.4,marginTop:24}},t.voice_mode_close)

}

// 8. OFFLINE MODE SERVICE
// ══════════════════════════════════════
function useOfflineMode(){
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [pendingSync,setPendingSync]=useState([]);
  useEffect(()=>{
    const onOnline=()=>{setIsOnline(true);syncPending()};
    const onOffline=()=>setIsOnline(false);
    window.addEventListener("online",onOnline);
    window.addEventListener("offline",onOffline);
    return()=>{window.removeEventListener("online",onOnline);window.removeEventListener("offline",onOffline)};
  },[]);
  const saveOffline=(key,data)=>{
    try{localStorage.setItem("shakti_offline_"+key,JSON.stringify({data,ts:Date.now()}));setPendingSync(p=>[...p.filter(x=>x!==key),key])}catch(e){}
  };
  const loadOffline=(key)=>{try{const s=localStorage.getItem("shakti_offline_"+key);return s?JSON.parse(s).data:null}catch(e){return null}};
  const syncPending=()=>{
    setTimeout(()=>setPendingSync([]),1500);
  };
  return{isOnline,pendingSync,saveOffline,loadOffline};
}
